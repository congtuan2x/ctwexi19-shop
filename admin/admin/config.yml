backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "store"
    label: "Cửa hàng"
    files:
      - file: "content/products.json"
        label: "Danh sách sản phẩm"
        name: "products"
        fields:
          - label: "Sản phẩm"
            name: "items"
            widget: "list"
            fields:
              - { label: "Mã SP", name: "sku", widget: "string" }
              - { label: "Tên sản phẩm", name: "title", widget: "string" }
              - { label: "Danh mục", name: "category", widget: "select", options: ["Trang sức", "Phụ kiện", "Khác"] }
              - { label: "Giá", name: "price", widget: "number" }
              - { label: "Tồn kho", name: "stock", widget: "number", default: 0 }
              - { label: "Ảnh", name: "image", widget: "image", required: false }
              - { label: "Mô tả", name: "desc", widget: "text", required: false }
