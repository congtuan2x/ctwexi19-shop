backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "products"
    label: "Sản phẩm"
    files:
      - file: "products.json"
        label: "Danh sách sản phẩm"
        name: "product_list"
        fields:
          - label: "Danh sách"
            name: "items"
            widget: "list"
            fields:
              - { label: "Tên sản phẩm", name: "title", widget: "string" }
              - { label: "Giá", name: "price", widget: "number" }
              - { label: "Tồn kho", name: "stock", widget: "number" }
              - { label: "Ảnh", name: "image", widget: "image" }
              - { label: "Mô tả", name: "desc", widget: "text" }
